<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Влезет ли мебель — Nonton</title>
  <style>
    @font-face {
      font-family: 'ALS Sirius';
      src: url('fonts/ALS_Sirius_Medium_1.6.otf') format('opentype');
      font-weight: 500;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #4DABE2;
      --purple: #7965AA;
      --black: #1A1A1A;
      --gray: #F5F5F5;
    }

    body {
      font-family: 'ALS Sirius', sans-serif;
      color: var(--black);
      background: #fff;
    }

    /* ── Header ── */
    header {
      padding: 20px 48px;
      border-bottom: 1px solid #E8E8E8;
    }
    header img { height: 36px; }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 72px 24px 56px;
      max-width: 720px;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      color: var(--blue);
      line-height: 1.2;
      margin-bottom: 20px;
    }
    .hero p {
      font-size: clamp(16px, 2vw, 20px);
      color: var(--black);
      line-height: 1.6;
    }

    /* ── Steps ── */
    .steps {
      background: var(--gray);
      padding: 56px 24px 48px;
    }
    .steps-inner {
      max-width: 900px;
      margin: 0 auto;
    }
    .steps h2 {
      text-align: center;
      font-size: clamp(20px, 3vw, 30px);
      color: var(--blue);
      margin-bottom: 40px;
    }

    /* Progress track */
    .steps-progress {
      display: flex;
      align-items: flex-start;
    }
    .step-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: none;
    }
    .step-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #D0D0D0;
      color: #fff;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.4s;
    }
    .step-circle.active { background: var(--blue); }
    .step-label {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
      text-align: center;
      max-width: 120px;
      line-height: 1.3;
      transition: color 0.4s;
    }
    .step-label.active { color: var(--black); }

    .step-connector {
      flex: 1;
      height: 4px;
      background: #D0D0D0;
      margin: 20px 4px 0;
      border-radius: 2px;
      overflow: hidden;
    }
    .step-connector-fill {
      height: 100%;
      width: 0%;
      background: var(--blue);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── Slider ── */
    .slider-section {
      padding: 48px 24px 64px;
      max-width: 960px;
      margin: 0 auto;
    }
    .slider {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      background: var(--gray);
      aspect-ratio: 16/9;
      cursor: grab;
      user-select: none;
    }
    .slider:active { cursor: grabbing; }
    .slides {
      display: flex;
      transition: transform 0.4s ease;
      height: 100%;
    }
    .slides.no-transition { transition: none; }
    .slide {
      min-width: 100%;
      height: 100%;
    }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
      pointer-events: none;
    }
    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: background 0.2s;
    }
    .slider-btn:hover { background: #fff; }
    .slider-btn.prev { left: 16px; }
    .slider-btn.next { right: 16px; }

    /* ── CTA ── */
    .cta {
      text-align: center;
      padding: 0 24px 80px;
    }
    .cta a {
      display: inline-block;
      background: var(--blue);
      color: #fff;
      font-family: 'ALS Sirius', sans-serif;
      font-size: 18px;
      padding: 18px 48px;
      border-radius: 50px;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }
    .cta a:hover {
      background: var(--purple);
      transform: translateY(-2px);
    }

    @media (max-width: 600px) {
      header { padding: 16px 24px; }
      .slider-btn { display: none; }
      .step-label { font-size: 11px; max-width: 80px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <img src="nonton-logo.png" alt="Nonton" />
  </header>

  <!-- Hero -->
  <section class="hero">
    <h1>Проверьте, влезет ли мебель — до покупки</h1>
    <p>Нарисуем комнату и расставим мебель за вас</p>
  </section>

  <!-- Steps with progress -->
  <section class="steps">
    <div class="steps-inner">
      <h2>Как это работает</h2>
      <div class="steps-progress">
        <div class="step-node">
          <div class="step-circle active" id="circle-0">1</div>
          <div class="step-label active" id="label-0">Укажите размеры комнаты</div>
        </div>
        <div class="step-connector">
          <div class="step-connector-fill" id="fill-0"></div>
        </div>
        <div class="step-node">
          <div class="step-circle" id="circle-1">2</div>
          <div class="step-label" id="label-1">Выберите мебель из каталога</div>
        </div>
        <div class="step-connector">
          <div class="step-connector-fill" id="fill-1"></div>
        </div>
        <div class="step-node">
          <div class="step-circle" id="circle-2">3</div>
          <div class="step-label" id="label-2">Расставьте и убедитесь, что всё входит</div>
        </div>
      </div>
    </div>
  </section>

  <!-- Slider -->
  <section class="slider-section">
    <div class="slider" id="slider">
      <div class="slides" id="slides">
        <div class="slide"><img src="для слайдера/2026-05-02 01.52.33.jpg" alt="Шаг 1" /></div>
        <div class="slide"><img src="для слайдера/2026-05-02 01.52.41.jpg" alt="Шаг 2" /></div>
        <div class="slide"><img src="для слайдера/2026-05-02 01.52.45.jpg" alt="Шаг 3" /></div>
      </div>
      <button class="slider-btn prev" id="btn-prev">&#8592;</button>
      <button class="slider-btn next" id="btn-next">&#8594;</button>
    </div>
  </section>

  <!-- CTA -->
  <section class="cta">
    <a href="https://makmakarova1995.github.io/nonti-fit-check/" target="_blank">
      Попробовать бесплатно →
    </a>
  </section>

  <script>
    const slidesEl = document.getElementById('slides');
    const sliderEl = document.getElementById('slider');
    const total = slidesEl.children.length;
    let current = 0;
    let autoTimer;

    function updateProgress(idx) {
      for (let i = 0; i < total; i++) {
        document.getElementById('circle-' + i).classList.toggle('active', i <= idx);
        document.getElementById('label-' + i).classList.toggle('active', i <= idx);
        const fill = document.getElementById('fill-' + i);
        if (fill) fill.style.width = i < idx ? '100%' : '0%';
      }
    }

    function goTo(n) {
      current = (n + total) % total;
      slidesEl.style.transform = `translateX(-${current * 100}%)`;
      updateProgress(current);
    }

    function move(dir) { goTo(current + dir); }

    function resetAuto() {
      clearInterval(autoTimer);
      autoTimer = setInterval(() => move(1), 4000);
    }

    document.getElementById('btn-prev').addEventListener('click', () => { move(-1); resetAuto(); });
    document.getElementById('btn-next').addEventListener('click', () => { move(1);  resetAuto(); });

    // Mouse drag
    let startX = 0, dragX = 0, dragging = false;

    sliderEl.addEventListener('mousedown', e => {
      dragging = true; startX = e.clientX; dragX = 0;
      slidesEl.classList.add('no-transition');
    });
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      dragX = e.clientX - startX;
      slidesEl.style.transform = `translateX(calc(-${current * 100}% + ${dragX}px))`;
    });
    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      slidesEl.classList.remove('no-transition');
      if (Math.abs(dragX) > sliderEl.offsetWidth * 0.25) move(dragX < 0 ? 1 : -1);
      else goTo(current);
      resetAuto();
    });

    // Touch swipe
    sliderEl.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX; dragX = 0;
      slidesEl.classList.add('no-transition');
    }, { passive: true });
    sliderEl.addEventListener('touchmove', e => {
      dragX = e.touches[0].clientX - startX;
      slidesEl.style.transform = `translateX(calc(-${current * 100}% + ${dragX}px))`;
    }, { passive: true });
    sliderEl.addEventListener('touchend', () => {
      slidesEl.classList.remove('no-transition');
      if (Math.abs(dragX) > sliderEl.offsetWidth * 0.25) move(dragX < 0 ? 1 : -1);
      else goTo(current);
      resetAuto();
    });

    updateProgress(0);
    resetAuto();
  </script>

</body>
</html>
